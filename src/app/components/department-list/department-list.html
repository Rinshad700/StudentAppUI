<div class="container mt-4">

    <!-- Department List -->
    <div *ngIf="!showForm">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h3>Department List</h3>

            <button
                class="btn btn-primary"
                (click)="newDepartment()">

                + New

            </button>

        </div>

        <div class="card shadow">

            <div class="card-body">
                <div class="row mb-3">

    <div class="col-md-4">

        <input
            type="text"
            class="form-control"
            placeholder="Search by department code or name..."
            [(ngModel)]="searchText"
            (keyup)="searchDepartments()">

    </div>

</div>

                <table class="table table-striped table-hover">

                    <thead class="table-primary">

                        <tr>
                            <th>Actions</th>
                            <th>Department Code</th>
                            <th>Department Name</th>
                            <th>Status</th>
                            

                        </tr>

                    </thead>

                   <tbody>
    <tr *ngFor="let department of departments">
       <td class="text-center">
    <button
        class="btn btn-link p-0"
        (click)="editDepartment(department)"
        title="Edit">

        <i class="bi bi-pencil-square"></i>

    </button>
</td>

        <td>{{ department.departmentCode }}</td>
        <td>{{ department.departmentName }}</td>

        <td>
            <span
                class="badge"
                [ngClass]="department.isActive ? 'bg-success' : 'bg-danger'">
                {{ department.isActive ? 'Active' : 'Inactive' }}
            </span>
        </td>

    </tr>
</tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Create Department Form -->
    <div *ngIf="showForm">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Create Department</h3>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Department Code <span class="text-danger">*</span>

                        </label>

                        <input
                            class="form-control"
                            type="text"
                            maxlength="10"
                            placeholder="e.g. CSE"
                            [(ngModel)]="department.departmentCode">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Department Name <span class="text-danger">*</span>

                        </label>

                        <input
                            class="form-control"
                            type="text"
                            placeholder="e.g. Computer Science Engineering"
                            [(ngModel)]="department.departmentName">

                    </div>

                </div>

                <div class="form-check form-switch mb-3">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="isActive"
                        [(ngModel)]="department.isActive">

                    <label
                        class="form-check-label"
                        for="isActive">

                        Active

                    </label>

                </div>

               <button
    class="btn btn-success me-2"
    (click)="saveDepartment()"
    [disabled]="!department.departmentCode || !department.departmentName">

    Save

</button>

                <button
                    class="btn btn-secondary"
                    (click)="cancel()">

                    Cancel

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Success Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">

    <div
        id="successToast"
        class="toast text-bg-success border-0"
        role="alert">

        <div class="d-flex">

            <div class="toast-body">

                Department created successfully!

            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>

        </div>

    </div>

</div>

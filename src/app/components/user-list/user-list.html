<div class="container mt-4">

    <!-- User List -->
    <div *ngIf="!showForm">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h3>User List</h3>

            <button
                class="btn btn-primary"
                (click)="newUser()">

                + New

            </button>

        </div>

        <div class="card shadow">

            <div class="card-body">

                <div class="row mb-3">

                    <div class="col-md-4">

                        <input
                            type="text"
                            class="form-control"
                            placeholder="Search by username, email or phone..."
                            [(ngModel)]="searchText"
                            (keyup)="searchUsers()">

                    </div>

                </div>

                <table class="table table-striped table-hover">

                    <thead class="table-primary">

                        <tr>

                            <th>Actions</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Phone Number</th>
                            <th>Role</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngFor="let user of users">

                            <td class="text-center">

                                <button
                                    class="btn btn-link p-0"
                                    (click)="editUser(user)"
                                    title="Edit">

                                    <i class="bi bi-pencil-square"></i>

                                </button>

                            </td>

                            <td>{{ user.userName }}</td>

                            <td>{{ user.email }}</td>

                            <td>{{ user.phoneNumber }}</td>

                            <td>{{ user.role }}</td>

                            <td>

                                <span
                                    class="badge"
                                    [ngClass]="user.isActive ? 'bg-success' : 'bg-danger'">

                                    {{ user.isActive ? 'Active' : 'Inactive' }}

                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Create / Update User -->

    <div *ngIf="showForm">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>

                    {{ isEditMode ? 'Update User' : 'Create User' }}

                </h3>

            </div>

            <div class="card-body">

                <div class="row">

                    <!-- Username -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Username <span class="text-danger">*</span>

                        </label>

                        <input
                            class="form-control"
                            [(ngModel)]="user.userName">

                    </div>

                    <!-- Email -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Email <span class="text-danger">*</span>

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            [(ngModel)]="user.email">

                    </div>

                    <!-- Phone -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            class="form-control"
                            [(ngModel)]="user.phoneNumber">

                    </div>

                    <!-- Role -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Role

                        </label>

                        <select
                            class="form-select"
                            [(ngModel)]="user.role">

                            <option
                                *ngFor="let role of roles"
                                [value]="role">

                                {{ role }}

                            </option>

                        </select>

                    </div>

                    <!-- Password -->

                    <div
                        class="col-md-6 mb-3"
                        *ngIf="!isEditMode">

                        <label class="form-label">

                            Password <span class="text-danger">*</span>

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            [(ngModel)]="user.password">

                    </div>

                    <!-- Confirm Password -->

                    <div
                        class="col-md-6 mb-3"
                        *ngIf="!isEditMode">

                        <label class="form-label">

                            Confirm Password <span class="text-danger">*</span>

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            [(ngModel)]="user.confirmPassword">

                    </div>

                </div>

                <!-- Active -->

                <div class="form-check form-switch mb-3">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="isActive"
                        [(ngModel)]="user.isActive">

                    <label
                        class="form-check-label"
                        for="isActive">

                        Active

                    </label>

                </div>

                <!-- Buttons -->

                <button
                    class="btn btn-success me-2"
                    (click)="saveUser()"
                    [disabled]="!isFormValid">

                    {{ isEditMode ? 'Update' : 'Save' }}

                </button>

                <button
                    class="btn btn-secondary"
                    (click)="cancel()">

                    Cancel

                </button>

            </div>

        </div>

    </div>

</div>
